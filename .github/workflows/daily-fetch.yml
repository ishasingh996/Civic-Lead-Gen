name: Daily Lead Fetch

on:
  schedule:
    - cron: '0 11 * * *'   # 6 AM EST daily
  workflow_dispatch:         # lets you trigger manually too

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        run: python fetch_rfps_rss.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rfp_results.json
          git diff --staged --quiet || git commit -m "chore: daily lead refresh"
          git push
